name: Daily Job Scan

on:
  workflow_dispatch:
    inputs:
      batch-ats:
        description: "Company ATS"
        required: false
        default: false
        type: boolean
      batch-boards-major:
        description: "Major Job Boards"
        required: false
        default: false
        type: boolean
      batch-boards-AU-NZ:
        description: "AU/NZ Regional Boards"
        required: false
        default: false
        type: boolean
      batch-boards-eu:
        description: "EU Job Boards"
        required: false
        default: false
        type: boolean
      batch-playwright:
        description: "Playwright Scrape"
        required: false
        default: false
        type: boolean
      batch-global:
        description: "Global Companies"
        required: false
        default: false
        type: boolean
      batch-apac:
        description: "APAC Companies"
        required: false
        default: false
        type: boolean
      batch-us-canada:
        description: "US/Canada Companies"
        required: false
        default: false
        type: boolean
      batch-middle-east:
        description: "Middle East Companies"
        required: false
        default: false
        type: boolean
      batch-eu:
        description: "EU Companies (terminal)"
        required: false
        default: false
        type: boolean
      resume_url:
        description: "Direct download URL to resume PDF (Google Drive, Dropbox, S3, etc.)"
        required: true

env:
  GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
  GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
  GSHEET_ID: ${{ secrets.GSHEET_ID }}

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        run: |
          MATRIX='{"include":[]}'
          [[ "${{ github.event.inputs.batch-ats }}" == "true" ]] && MATRIX=$(echo "$MATRIX" | jq -c '.include += [{"batch":"ats"}]')
          [[ "${{ github.event.inputs.batch-boards-major }}" == "true" ]] && MATRIX=$(echo "$MATRIX" | jq -c '.include += [{"batch":"boards-major"}]')
          [[ "${{ github.event.inputs.batch-boards-AU-NZ }}" == "true" ]] && MATRIX=$(echo "$MATRIX" | jq -c '.include += [{"batch":"boards-AU-NZ"}]')
          [[ "${{ github.event.inputs.batch-boards-eu }}" == "true" ]] && MATRIX=$(echo "$MATRIX" | jq -c '.include += [{"batch":"boards-eu"}]')
          [[ "${{ github.event.inputs.batch-playwright }}" == "true" ]] && MATRIX=$(echo "$MATRIX" | jq -c '.include += [{"batch":"playwright"}]')
          [[ "${{ github.event.inputs.batch-global }}" == "true" ]] && MATRIX=$(echo "$MATRIX" | jq -c '.include += [{"batch":"global"}]')
          [[ "${{ github.event.inputs.batch-apac }}" == "true" ]] && MATRIX=$(echo "$MATRIX" | jq -c '.include += [{"batch":"apac"}]')
          [[ "${{ github.event.inputs.batch-us-canada }}" == "true" ]] && MATRIX=$(echo "$MATRIX" | jq -c '.include += [{"batch":"us-canada"}]')
          [[ "${{ github.event.inputs.batch-middle-east }}" == "true" ]] && MATRIX=$(echo "$MATRIX" | jq -c '.include += [{"batch":"middle-east"}]')
          [[ "${{ github.event.inputs.batch-eu }}" == "true" ]] && MATRIX=$(echo "$MATRIX" | jq -c '.include += [{"batch":"eu"}]')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  setup:
    needs: resolve
    if: ${{ needs.resolve.outputs.matrix != '{"include":[]}' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install download helpers
        run: pip install requests gdown 2>&1
        continue-on-error: true

      - name: Restore Google service account
        run: echo '${{ secrets.GSHEET_SERVICE_ACCOUNT_JSON }}' > gsheet_service_account.json

      - name: Download resume from URL
        run: |
          URL="${{ github.event.inputs.resume_url }}"
          if echo "$URL" | grep -q 'drive.google.com'; then
            FILE_ID=$(echo "$URL" | sed 's|.*[=/]\([a-zA-Z0-9_-]\{25,\}\).*|\1|')
            echo "Downloading from Google Drive (file ID: $FILE_ID)..."
            pip install gdown 2>/dev/null
            gdown "$FILE_ID" -O resume.pdf --fuzzy 2>&1 || python3 -c "
          import requests, re, sys
          file_id = '$FILE_ID'
          url = f'https://drive.google.com/uc?export=download&id={file_id}'
          s = requests.Session()
          resp = s.get(url, timeout=30)
          confirm = re.search(r'confirm=([^&]+)', resp.text)
          if confirm:
              resp = s.get(f'{url}&confirm={confirm.group(1)}', timeout=30)
          with open('resume.pdf', 'wb') as f:
              f.write(resp.content)
          " 2>&1
          else
            curl -L -o resume.pdf "$URL"
          fi
          if [ "$(head -c 4 resume.pdf)" != "%PDF" ]; then
            head -c 500 resume.pdf
            echo ""
            echo "ERROR: Downloaded file is not a PDF (no %PDF header)"
            echo "URL may not be a direct PDF link. Check the URL and try again."
            exit 1
          fi
          echo "RESUME=resume.pdf" >> "$GITHUB_ENV"

      - name: Cache IND sponsor list
        run: |
          pip install requests beautifulsoup4 2>/dev/null
          python -c "
import requests, json
from bs4 import BeautifulSoup
url = 'https://ind.nl/en/public-register-recognised-sponsors/public-register-regular-labour-and-highly-skilled-migrants'
resp = requests.get(url, timeout=30)
soup = BeautifulSoup(resp.text, 'html.parser')
names = set()
for th in soup.select('table th[scope=\"row\"]'):
    name = th.get_text(strip=True)
    if name:
        names.add(name.lower())
base = set()
for name in names:
    words = name.split()
    if words:
        c = words[0].rstrip(',.')
        if len(c) > 1:
            base.add(c)
        if len(words) >= 2:
            c2 = f'{words[0]} {words[1].rstrip(\",.\")}'.lower()
            base.add(c2)
result = list(names | base)
with open('ind_sponsors_cache.json', 'w') as f:
    json.dump(result, f)
print(f'Cached {len(result)} IND sponsor lookup keys')
" 2>&1

      - uses: actions/upload-artifact@v5
        with:
          name: setup
          path: |
            resume.pdf
            gsheet_service_account.json
            ind_sponsors_cache.json
          retention-days: 1

  scan:
    needs: [resolve, setup]
    if: ${{ needs.resolve.outputs.matrix != '{"include":[]}' }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      matrix: ${{ fromJson(needs.resolve.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: setup

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Validate config
        run: |
          if [ ! -f "resume.pdf" ]; then
            echo "Resume PDF not found"
            exit 1
          fi
          python -c "
          import os
          for var in ['GMAIL_ADDRESS', 'GMAIL_APP_PASSWORD', 'GSHEET_ID']:
              if not os.getenv(var):
                  print(f'Missing secret: {var}')
                  exit(1)
          print('All secrets set')
          "

      - name: Run batch
        run: python daily_scan.py --resume resume.pdf --batch ${{ matrix.batch }} 2>&1 | tee scan_batch_${{ matrix.batch }}.log

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: scan-logs-${{ matrix.batch }}
          path: |
            scan_batch_${{ matrix.batch }}.log
            last_scan_results_batch_${{ matrix.batch }}.json
            last_scan_results.json
          retention-days: 7
