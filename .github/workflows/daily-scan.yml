name: Daily Job Scan

on:
  repository_dispatch:
    types: [manual_scan]
  workflow_dispatch:
    inputs:
      batch-ats:
        description: "Company ATS"
        required: false
        default: false
        type: boolean
      batch-boards-major:
        description: "Major Job Boards"
        required: false
        default: false
        type: boolean
      batch-boards-AU-NZ:
        description: "AU/NZ Regional Boards"
        required: false
        default: false
        type: boolean
      batch-boards-eu:
        description: "EU Job Boards"
        required: false
        default: false
        type: boolean
      batch-playwright:
        description: "Playwright Scrape"
        required: false
        default: false
        type: boolean
      batch-global:
        description: "Global Companies"
        required: false
        default: false
        type: boolean
      batch-apac:
        description: "APAC Companies"
        required: false
        default: false
        type: boolean
      batch-us-canada:
        description: "US/Canada Companies"
        required: false
        default: false
        type: boolean
      batch-middle-east:
        description: "Middle East Companies"
        required: false
        default: false
        type: boolean
      batch-eu:
        description: "EU Companies (terminal)"
        required: false
        default: false
        type: boolean
      batch-remote:
        description: "Remote Companies + Remote Job Boards"
        required: false
        default: false
        type: boolean
      resume_url:
        description: "Direct download URL to resume PDF (Google Drive, Dropbox, S3, etc.)"
        required: false
        default: ""
      gmail_user:
        description: "Gmail address (defaults to secrets.GMAIL_ADDRESS)"
        required: false
        default: ""
      gmail_pass:
        description: "Gmail App Password (defaults to secrets.GMAIL_APP_PASSWORD)"
        required: false
        default: ""
      gsheet_id:
        description: "Google Sheet ID for tracker (defaults to secrets.GSHEET_ID)"
        required: false
        default: ""
      profile:
        description: "Profile name to use (e.g. kamnee, pradeep). Defaults to auto-detect from resume."
        required: false
        default: ""
      gmail_label:
        description: "Gmail label for email scan (defaults to 'Interview')"
        required: false
        default: ""

env:
  GMAIL_ADDRESS: ${{ inputs.gmail_user || secrets.GMAIL_ADDRESS }}
  GMAIL_APP_PASSWORD: ${{ inputs.gmail_pass || secrets.GMAIL_APP_PASSWORD }}
  GSHEET_ID: ${{ inputs.gsheet_id || secrets.GSHEET_ID }}
  GMAIL_LABEL: ${{ inputs.gmail_label || 'Interview' }}

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      is_web_trigger: ${{ steps.matrix.outputs.is_web_trigger }}
      user_id: ${{ steps.matrix.outputs.user_id }}
      scan_id: ${{ steps.matrix.outputs.scan_id }}
    steps:
      - id: matrix
        run: |
          MATRIX='{"include":[]}'
          IS_WEB="false"
          USER_ID=""
          SCAN_ID=""

          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            IS_WEB="true"
            USER_ID="${{ github.event.client_payload.user_id }}"
            SCAN_ID="${{ github.event.client_payload.scan_id }}"
            BATCHES="${{ github.event.client_payload.batches }}"

            # If batches are specified, create one matrix entry per batch
            if [ -n "$BATCHES" ] && [ "$BATCHES" != "all" ]; then
              for BATCH in $(echo "$BATCHES" | tr ',' ' '); do
                MATRIX=$(echo "$MATRIX" | jq -c --arg b "$BATCH" '.include += [{"batch": $b}]')
              done
            else
              # Default: run all batches in parallel
              for BATCH in ats boards-major boards-eu boards-remote playwright eu global apac us-canada middle-east remote; do
                MATRIX=$(echo "$MATRIX" | jq -c --arg b "$BATCH" '.include += [{"batch": $b}]')
              done
            fi
          else
            # workflow_dispatch: build matrix from boolean inputs
            [[ "${{ github.event.inputs.batch-ats }}" == "true" ]] && MATRIX=$(echo "$MATRIX" | jq -c '.include += [{"batch":"ats"}]')
            [[ "${{ github.event.inputs.batch-boards-major }}" == "true" ]] && MATRIX=$(echo "$MATRIX" | jq -c '.include += [{"batch":"boards-major"}]')
            [[ "${{ github.event.inputs.batch-boards-AU-NZ }}" == "true" ]] && MATRIX=$(echo "$MATRIX" | jq -c '.include += [{"batch":"boards-AU-NZ"}]')
            [[ "${{ github.event.inputs.batch-boards-eu }}" == "true" ]] && MATRIX=$(echo "$MATRIX" | jq -c '.include += [{"batch":"boards-eu"}]')
            [[ "${{ github.event.inputs.batch-playwright }}" == "true" ]] && MATRIX=$(echo "$MATRIX" | jq -c '.include += [{"batch":"playwright"}]')
            [[ "${{ github.event.inputs.batch-global }}" == "true" ]] && MATRIX=$(echo "$MATRIX" | jq -c '.include += [{"batch":"global"}]')
            [[ "${{ github.event.inputs.batch-apac }}" == "true" ]] && MATRIX=$(echo "$MATRIX" | jq -c '.include += [{"batch":"apac"}]')
            [[ "${{ github.event.inputs.batch-us-canada }}" == "true" ]] && MATRIX=$(echo "$MATRIX" | jq -c '.include += [{"batch":"us-canada"}]')
            [[ "${{ github.event.inputs.batch-middle-east }}" == "true" ]] && MATRIX=$(echo "$MATRIX" | jq -c '.include += [{"batch":"middle-east"}]')
            [[ "${{ github.event.inputs.batch-eu }}" == "true" ]] && MATRIX=$(echo "$MATRIX" | jq -c '.include += [{"batch":"eu"}]')
            [[ "${{ github.event.inputs.batch-remote }}" == "true" ]] && MATRIX=$(echo "$MATRIX" | jq -c '.include += [{"batch":"remote"}]')
          fi

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "is_web_trigger=$IS_WEB" >> "$GITHUB_OUTPUT"
          echo "user_id=$USER_ID" >> "$GITHUB_OUTPUT"
          echo "scan_id=$SCAN_ID" >> "$GITHUB_OUTPUT"

  # Setup job: only needed for manual workflow_dispatch (downloads resume, gsheet creds)
  setup:
    needs: resolve
    if: ${{ needs.resolve.outputs.matrix != '{"include":[]}' && needs.resolve.outputs.is_web_trigger != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install download helpers
        run: pip install requests gdown 2>&1
        continue-on-error: true

      - name: Restore Google service account
        run: echo '${{ secrets.GSHEET_SERVICE_ACCOUNT_JSON }}' > gsheet_service_account.json

      - name: Download resume from URL
        run: |
          URL="${{ github.event.inputs.resume_url }}"
          if [ -z "$URL" ]; then
            echo "No resume URL provided, creating empty placeholder"
            touch resume.pdf
            exit 0
          fi
          if echo "$URL" | grep -q 'drive.google.com'; then
            FILE_ID=$(echo "$URL" | sed 's|.*[=/]\([a-zA-Z0-9_-]\{25,\}\).*|\1|')
            echo "Downloading from Google Drive (file ID: $FILE_ID)..."
            pip install gdown 2>/dev/null
            gdown "$FILE_ID" -O resume.pdf --fuzzy 2>&1 || python3 -c "
          import requests, re, sys
          file_id = '$FILE_ID'
          url = f'https://drive.google.com/uc?export=download&id={file_id}'
          s = requests.Session()
          resp = s.get(url, timeout=30)
          confirm = re.search(r'confirm=([^&]+)', resp.text)
          if confirm:
              resp = s.get(f'{url}&confirm={confirm.group(1)}', timeout=30)
          with open('resume.pdf', 'wb') as f:
              f.write(resp.content)
          " 2>&1
          else
            curl -L -o resume.pdf "$URL"
          fi
          if [ "$(head -c 4 resume.pdf)" != "%PDF" ]; then
            head -c 500 resume.pdf
            echo ""
            echo "ERROR: Downloaded file is not a PDF (no %PDF header)"
            echo "URL may not be a direct PDF link. Check the URL and try again."
            exit 1
          fi
          echo "RESUME=resume.pdf" >> "$GITHUB_ENV"

      - name: Cache IND sponsor list
        run: python cache_ind_sponsors.py 2>&1

      - uses: actions/upload-artifact@v5
        with:
          name: setup
          path: |
            resume.pdf
            gsheet_service_account.json
            ind_sponsors_cache.json
          retention-days: 1

  # Scan job for manual workflow_dispatch (resume-based, uses setup artifacts)
  scan:
    needs: [resolve, setup]
    if: ${{ needs.resolve.outputs.matrix != '{"include":[]}' && needs.resolve.outputs.is_web_trigger != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      matrix: ${{ fromJson(needs.resolve.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: setup

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Validate config
        run: |
          python -c "
          import os
          for var in ['GMAIL_ADDRESS', 'GMAIL_APP_PASSWORD']:
              if not os.getenv(var):
                  print(f'Missing secret: {var}')
                  exit(1)
          print('All secrets set')
          "

      - name: Run batch
        run: |
          PROFILE_FLAG=""
          [[ -n "${{ inputs.profile }}" ]] && PROFILE_FLAG="--profile ${{ inputs.profile }}"
          RESUME_FLAG=""
          if [ -f "resume.pdf" ] && [ -s "resume.pdf" ]; then
            RESUME_FLAG="--resume resume.pdf"
          fi
          python daily_scan.py $RESUME_FLAG $PROFILE_FLAG --batch ${{ matrix.batch }} 2>&1 | tee scan_batch_${{ matrix.batch }}.log

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: scan-logs-${{ matrix.batch }}
          path: |
            scan_batch_${{ matrix.batch }}.log
            last_scan_results_batch_${{ matrix.batch }}.json
            last_scan_results.json
          retention-days: 7

  # Scan job for web-triggered repository_dispatch (Supabase profile, no resume needed)
  scan-web:
    needs: resolve
    if: ${{ needs.resolve.outputs.matrix != '{"include":[]}' && needs.resolve.outputs.is_web_trigger == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      matrix: ${{ fromJson(needs.resolve.outputs.matrix) }}
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Restore Google service account
        run: echo '${{ secrets.GSHEET_SERVICE_ACCOUNT_JSON }}' > gsheet_service_account.json
        continue-on-error: true

      - name: Cache IND sponsor list
        run: python cache_ind_sponsors.py 2>&1
        continue-on-error: true

      - name: Run batch (Supabase profile)
        run: |
          python daily_scan.py \
            --user-id "${{ needs.resolve.outputs.user_id }}" \
            --scan-id "${{ needs.resolve.outputs.scan_id }}" \
            --batch ${{ matrix.batch }} \
            2>&1 | tee scan_batch_${{ matrix.batch }}.log

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: scan-web-logs-${{ matrix.batch }}
          path: |
            scan_batch_${{ matrix.batch }}.log
            last_scan_results_batch_${{ matrix.batch }}.json
          retention-days: 7
