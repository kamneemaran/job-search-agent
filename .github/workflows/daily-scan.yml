name: Daily Job Scan

on:
  workflow_dispatch:
    inputs:
      batch:
        description: "Run specific batch (1, 2, 3) or all"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - "1"
          - "2a"
          - "2b"
          - "3"
      resume_url:
        description: "Direct download URL to resume PDF (Google Drive, Dropbox, S3, etc.)"
        required: true

env:
  GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
  GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
  GSHEET_ID: ${{ secrets.GSHEET_ID }}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - name: Restore Google service account
        run: echo '${{ secrets.GSHEET_SERVICE_ACCOUNT_JSON }}' > gsheet_service_account.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium
      - name: Download resume from URL
        run: |
          curl -L -o resume.pdf "${{ github.event.inputs.resume_url }}"
          if [ "$(head -c 4 resume.pdf)" != "%PDF" ]; then
            head -c 500 resume.pdf
            echo ""
            echo "ERROR: Downloaded file is not a PDF (no %PDF header)"
            echo "If using Google Drive, add &confirm=t to the URL"
            exit 1
          fi
          echo "RESUME=resume.pdf" >> "$GITHUB_ENV"

      - name: Validate config
        run: |
          if [ ! -f "$RESUME" ]; then
            echo "Resume PDF not found: $RESUME"
            exit 1
          fi
          python -c "
          import os
          for var in ['GMAIL_ADDRESS', 'GMAIL_APP_PASSWORD', 'GSHEET_ID']:
              if not os.getenv(var):
                  print(f'Missing secret: {var}')
                  exit(1)
          print('All secrets set')
          "

      - name: Batch 1 - Company ATS
        if: ${{ github.event.inputs.batch == 'all' || github.event.inputs.batch == '1' }}
        run: python daily_scan.py --resume "$RESUME" --batch 1 2>&1 | tee scan_batch1.log

      - name: Batch 2a - Global Job Boards
        if: ${{ github.event.inputs.batch == 'all' || github.event.inputs.batch == '2a' }}
        run: python daily_scan.py --resume "$RESUME" --batch 2a 2>&1 | tee scan_batch2a.log

      - name: Batch 2b - Niche/Regional Boards
        if: ${{ github.event.inputs.batch == 'all' || github.event.inputs.batch == '2b' }}
        run: python daily_scan.py --resume "$RESUME" --batch 2b 2>&1 | tee scan_batch2b.log

      - name: Batch 3 - Playwright + Merge + Email
        if: ${{ github.event.inputs.batch == 'all' || github.event.inputs.batch == '3' }}
        run: python daily_scan.py --resume "$RESUME" --batch 3 2>&1 | tee scan_batch3.log

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: scan-logs
          path: |
            scan_batch*.log
            last_scan_results_batch_*.json
            last_scan_results.json
          retention-days: 7
