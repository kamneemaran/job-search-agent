name: Daily Job Scan

on:
  workflow_dispatch:
    inputs:
      batch:
        description: "Run specific batch or all (1=ATS, 2a=global boards, 2b=niche boards, 3=playwright, 4=EU companies, 5=Global, 6=APAC, 7=US/Canada, 8=Middle East)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - "1"
          - "2a"
          - "2b"
          - "3"
          - "4"
          - "5"
          - "6"
          - "7"
          - "8"
      resume_url:
        description: "Direct download URL to resume PDF (Google Drive, Dropbox, S3, etc.)"
        required: true

env:
  GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
  GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
  GSHEET_ID: ${{ secrets.GSHEET_ID }}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - name: Restore Google service account
        run: echo '${{ secrets.GSHEET_SERVICE_ACCOUNT_JSON }}' > gsheet_service_account.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Download resume from URL
        run: |
          URL="${{ github.event.inputs.resume_url }}"
          if echo "$URL" | grep -q 'drive.google.com/file/d/'; then
            FILE_ID=$(echo "$URL" | sed 's|.*drive.google.com/file/d/\([^/]*\).*|\1|')
            URL="https://drive.google.com/uc?export=download&id=${FILE_ID}&confirm=t"
            echo "Converted Google Drive URL to direct download"
          elif echo "$URL" | grep -q 'drive.google.com/open?id='; then
            FILE_ID=$(echo "$URL" | sed 's|.*open?id=\([^&]*\).*|\1|')
            URL="https://drive.google.com/uc?export=download&id=${FILE_ID}&confirm=t"
            echo "Converted Google Drive URL to direct download"
          fi
          curl -L -o resume.pdf "$URL"
          if [ "$(head -c 4 resume.pdf)" != "%PDF" ]; then
            head -c 500 resume.pdf
            echo ""
            echo "ERROR: Downloaded file is not a PDF (no %PDF header)"
            echo "URL may not be a direct PDF link. Check the URL and try again."
            exit 1
          fi
          echo "RESUME=resume.pdf" >> "$GITHUB_ENV"

      - name: Validate config
        run: |
          if [ ! -f "$RESUME" ]; then
            echo "Resume PDF not found: $RESUME"
            exit 1
          fi
          python -c "
          import os
          for var in ['GMAIL_ADDRESS', 'GMAIL_APP_PASSWORD', 'GSHEET_ID']:
              if not os.getenv(var):
                  print(f'Missing secret: {var}')
                  exit(1)
          print('All secrets set')
          "

      - name: Batch 1 - Company ATS
        if: ${{ github.event.inputs.batch == 'all' || github.event.inputs.batch == '1' }}
        run: python daily_scan.py --resume "$RESUME" --batch ats 2>&1 | tee scan_batch1.log

      - name: Batch 2a - Global Job Boards
        if: ${{ github.event.inputs.batch == 'all' || github.event.inputs.batch == '2a' }}
        run: python daily_scan.py --resume "$RESUME" --batch boards-major 2>&1 | tee scan_batch2a.log

      - name: Batch 2b - Niche/Regional Boards
        if: ${{ github.event.inputs.batch == 'all' || github.event.inputs.batch == '2b' }}
        run: python daily_scan.py --resume "$RESUME" --batch boards-niche 2>&1 | tee scan_batch2b.log

      - name: Batch 3 - Playwright + Merge + Email
        if: ${{ github.event.inputs.batch == 'all' || github.event.inputs.batch == '3' }}
        run: python daily_scan.py --resume "$RESUME" --batch playwright 2>&1 | tee scan_batch3.log

      - name: Batch 4 - Global Companies
        if: ${{ github.event.inputs.batch == 'all' || github.event.inputs.batch == '4' }}
        run: python daily_scan.py --resume "$RESUME" --batch global 2>&1 | tee scan_batch4.log

      - name: Batch 5 - APAC Companies
        if: ${{ github.event.inputs.batch == 'all' || github.event.inputs.batch == '5' }}
        run: python daily_scan.py --resume "$RESUME" --batch apac 2>&1 | tee scan_batch5.log

      - name: Batch 6 - US/Canada Companies
        if: ${{ github.event.inputs.batch == 'all' || github.event.inputs.batch == '6' }}
        run: python daily_scan.py --resume "$RESUME" --batch us-canada 2>&1 | tee scan_batch6.log

      - name: Batch 7 - Middle East Companies
        if: ${{ github.event.inputs.batch == 'all' || github.event.inputs.batch == '7' }}
        run: python daily_scan.py --resume "$RESUME" --batch middle-east 2>&1 | tee scan_batch7.log

      - name: Batch 8 - EU Companies (terminal - merges all previous)
        if: ${{ github.event.inputs.batch == 'all' || github.event.inputs.batch == '8' }}
        run: python daily_scan.py --resume "$RESUME" --batch eu 2>&1 | tee scan_batch8.log

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: scan-logs
          path: |
            scan_batch*.log
            last_scan_results_batch_*.json
            last_scan_results.json
          retention-days: 7
