name: Daily Job Scan

on:
  workflow_dispatch:
    inputs:
      batch-ats:
        description: "Company ATS"
        required: false
        default: false
        type: boolean
      batch-boards-major:
        description: "Major Job Boards"
        required: false
        default: false
        type: boolean
      batch-boards-AU-NZ:
        description: "AU/NZ Regional Boards"
        required: false
        default: false
        type: boolean
      batch-playwright:
        description: "Playwright Scrape"
        required: false
        default: false
        type: boolean
      batch-global:
        description: "Global Companies"
        required: false
        default: false
        type: boolean
      batch-apac:
        description: "APAC Companies"
        required: false
        default: false
        type: boolean
      batch-us-canada:
        description: "US/Canada Companies"
        required: false
        default: false
        type: boolean
      batch-middle-east:
        description: "Middle East Companies"
        required: false
        default: false
        type: boolean
      batch-eu:
        description: "EU Companies (terminal - merges all previous)"
        required: false
        default: false
        type: boolean
      resume_url:
        description: "Direct download URL to resume PDF (Google Drive, Dropbox, S3, etc.)"
        required: true

env:
  GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
  GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
  GSHEET_ID: ${{ secrets.GSHEET_ID }}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - name: Restore Google service account
        run: echo '${{ secrets.GSHEET_SERVICE_ACCOUNT_JSON }}' > gsheet_service_account.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Download resume from URL
        run: |
          URL="${{ github.event.inputs.resume_url }}"
          if echo "$URL" | grep -q 'drive.google.com'; then
            echo "Downloading from Google Drive..."
            pip install gdown -q 2>/dev/null
            gdown "$URL" -O resume.pdf
          else
            curl -L -o resume.pdf "$URL"
          fi
          if [ "$(head -c 4 resume.pdf)" != "%PDF" ]; then
            head -c 500 resume.pdf
            echo ""
            echo "ERROR: Downloaded file is not a PDF (no %PDF header)"
            echo "URL may not be a direct PDF link. Check the URL and try again."
            exit 1
          fi
          echo "RESUME=resume.pdf" >> "$GITHUB_ENV"

      - name: Validate config
        run: |
          if [ ! -f "$RESUME" ]; then
            echo "Resume PDF not found: $RESUME"
            exit 1
          fi
          python -c "
          import os
          for var in ['GMAIL_ADDRESS', 'GMAIL_APP_PASSWORD', 'GSHEET_ID']:
              if not os.getenv(var):
                  print(f'Missing secret: {var}')
                  exit(1)
          print('All secrets set')
          "

      - name: Batch 1 - Company ATS
        if: ${{ github.event.inputs.batch-ats == 'true' }}
        run: python daily_scan.py --resume "$RESUME" --batch ats 2>&1 | tee scan_batch1.log

      - name: Batch 2 - Major Job Boards
        if: ${{ github.event.inputs.batch-boards-major == 'true' }}
        run: python daily_scan.py --resume "$RESUME" --batch boards-major 2>&1 | tee scan_batch2.log

      - name: Batch 3 - AU/NZ Regional Boards
        if: ${{ github.event.inputs.batch-boards-AU-NZ == 'true' }}
        run: python daily_scan.py --resume "$RESUME" --batch boards-AU-NZ 2>&1 | tee scan_batch3.log

      - name: Batch 4 - Playwright Scrape
        if: ${{ github.event.inputs.batch-playwright == 'true' }}
        run: python daily_scan.py --resume "$RESUME" --batch playwright 2>&1 | tee scan_batch4.log

      - name: Batch 5 - Global Companies
        if: ${{ github.event.inputs.batch-global == 'true' }}
        run: python daily_scan.py --resume "$RESUME" --batch global 2>&1 | tee scan_batch5.log

      - name: Batch 6 - APAC Companies
        if: ${{ github.event.inputs.batch-apac == 'true' }}
        run: python daily_scan.py --resume "$RESUME" --batch apac 2>&1 | tee scan_batch6.log

      - name: Batch 7 - US/Canada Companies
        if: ${{ github.event.inputs.batch-us-canada == 'true' }}
        run: python daily_scan.py --resume "$RESUME" --batch us-canada 2>&1 | tee scan_batch7.log

      - name: Batch 8 - Middle East Companies
        if: ${{ github.event.inputs.batch-middle-east == 'true' }}
        run: python daily_scan.py --resume "$RESUME" --batch middle-east 2>&1 | tee scan_batch8.log

      - name: Batch 9 - EU Companies (terminal - merges all previous)
        if: ${{ github.event.inputs.batch-eu == 'true' }}
        run: python daily_scan.py --resume "$RESUME" --batch eu 2>&1 | tee scan_batch9.log

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: scan-logs
          path: |
            scan_batch*.log
            last_scan_results_batch_*.json
            last_scan_results.json
          retention-days: 7
