name: Daily Job Scan

on:
  schedule:
    - cron: '0 6 * * *'  # 6:00 UTC daily
  workflow_dispatch:
    inputs:
      batch_override:
        description: 'Override batch to run (leave empty for full pipeline)'
        required: false
        default: ''

env:
  PYTHON_VERSION: '3.12'

jobs:
  # --- Stage 1: Non-Playwright batches (fast, HTTP-only) ---
  http-batches:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        batch: [ats, boards-major, boards-AU-NZ, boards-remote]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run ${{ matrix.batch }}
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python daily_scan.py --batch ${{ matrix.batch }}
      - uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.batch }}
          path: last_scan_results_batch_${{ matrix.batch }}.json
          retention-days: 1

  # --- Stage 2: Playwright EU scrapers (parallelized via matrix) ---
  playwright-eu:
    runs-on: ubuntu-latest
    needs: http-batches
    strategy:
      fail-fast: false
      matrix:
        scraper:
          - SAPOEmprego
          - Bundesagentur
          - IamExpat
          - WorkInLux
          - IndeedNL
          - StepStone
          - Freelancermap
          - Intermediair
          - NationaleVacaturebank
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps
      - name: Run ${{ matrix.scraper }}
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          PLAYWRIGHT_SCRAPER_FILTER: ${{ matrix.scraper }}
        run: python daily_scan.py --batch boards-eu
      - uses: actions/upload-artifact@v4
        with:
          name: results-pw-${{ matrix.scraper }}
          path: last_scan_results_batch_boards-eu.json
          retention-days: 1

  # --- Stage 3: Remaining Playwright batch + company batches ---
  playwright-other:
    runs-on: ubuntu-latest
    needs: http-batches
    strategy:
      fail-fast: false
      matrix:
        batch: [playwright, global, apac, us-canada, middle-east, eu]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps
      - name: Run ${{ matrix.batch }}
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python daily_scan.py --batch ${{ matrix.batch }}
      - uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.batch }}
          path: last_scan_results_batch_${{ matrix.batch }}.json
          retention-days: 1

  # --- Stage 4: Merge all results and send final email ---
  merge-results:
    runs-on: ubuntu-latest
    needs: [playwright-eu, playwright-other]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: results-*
          merge-multiple: true
      - name: Collect batch results
        run: |
          # Move all batch JSON files to working dir for merge
          find artifacts/ -name "last_scan_results_batch_*.json" -exec cp {} . \;
          ls -la last_scan_results_batch_*.json 2>/dev/null || echo "No batch files found"
      - name: Merge and send digest
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python daily_scan.py --batch eu
